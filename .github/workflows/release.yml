name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  BINARY_NAME: engram

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: engram
            archive: engram-linux-x86_64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: engram
            archive: engram-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: engram
            archive: engram-macos-arm64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: engram.exe
            archive: engram-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.artifact }}" -DestinationPath "${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes from changelog
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME}"
          CHANGELOG="docs/en/changelog.md"

          if [ -f "$CHANGELOG" ]; then
            # Extract notes for this version (between ## vX.Y.Z and the next ##)
            NOTES=$(awk "/^## ${VERSION}/,/^## /" "$CHANGELOG" | head -n -1)

            if [ -z "$NOTES" ]; then
              # Try without 'v' prefix
              VERSION_CLEAN="${VERSION#v}"
              NOTES=$(awk "/^## ${VERSION_CLEAN}/,/^## /" "$CHANGELOG" | head -n -1)
            fi

            if [ -z "$NOTES" ]; then
              NOTES="Release ${VERSION}

See [changelog](docs/en/changelog.md) for details."
            fi
          else
            NOTES="Release ${VERSION}"
          fi

          # Write to file for the release body
          echo "$NOTES" > release_notes.md

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum **/*.tar.gz **/*.zip > ../checksums-sha256.txt 2>/dev/null || true
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "The Crab Engram ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            artifacts/**/*
            checksums-sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
