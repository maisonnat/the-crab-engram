name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  BINARY_NAME: the-crab-engram

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 GNU — native build on ubuntu
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          # macOS aarch64 (Apple Silicon — native on macos-latest)
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
          # Windows aarch64
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Install cross (Linux)
        if: matrix.use_cross
        run: |
          CROSS_URL="https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-musl.tar.gz"
          curl -sSL "$CROSS_URL" | tar xz -C /usr/local/bin

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build release (cargo)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../the-crab-engram-${{ github.ref_name }}-${{ matrix.target }}.tar.gz the-crab-engram

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/the-crab-engram.exe" -DestinationPath "the-crab-engram-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  build-release-deb:
    name: Build .deb package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb
        run: cargo deb --target x86_64-unknown-linux-gnu

      - name: Rename .deb with version
        run: |
          cd target/x86_64-unknown-linux-gnu/debian
          DEB_FILE=$(ls *.deb | head -1)
          mv "$DEB_FILE" "the-crab-engram-${{ github.ref_name }}-x86_64-unknown-linux-gnu.deb"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: target/x86_64-unknown-linux-gnu/debian/*.deb

  release:
    name: Create Release
    needs: [build, build-release-deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF_NAME}"
          CHANGELOG="docs/en/changelog.md"
          NOTES="Release ${VERSION}"
          if [ -f "$CHANGELOG" ]; then
            EXTRACTED=$(awk "/^## ${VERSION}/{found=1;next} /^## /{if(found)exit} found" "$CHANGELOG" 2>/dev/null || true)
            if [ -n "$EXTRACTED" ]; then
              NOTES="$EXTRACTED"
            fi
          fi
          echo "$NOTES" > release_notes.md

      - name: Generate checksums
        run: |
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.deb" \) -exec sha256sum {} \; > checksums-sha256.txt || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "The Crab Engram ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.deb
            checksums-sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
